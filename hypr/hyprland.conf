# -----------------------------------------------------
# Monitor 
# -----------------------------------------------------

  monitor = eDP-1, 1920x1080@59.98Hz, 0x0, 1

# -----------------------------------------------------
# Keyboard
# -----------------------------------------------------
  source = ~/.config/hypr/keyboard.conf

# -----------------------------------------------------
# Load configuration files
# -----------------------------------------------------
  source = ~/.config/hypr/keybindings.conf

# -----------------------------------------------------
# Load Colors 
# -----------------------------------------------------

  source = ~/.config/hypr/colors.conf  

# -----------------------------------------------------
# load wallpaper
# -----------------------------------------------------

  exec-once=hyprpaper
  
# Load waybar

  exec-once=waybar

# Load QuickShell

  exec-once=quickshell -p ~/.config/quickshell/shell.qml

# Load hypridle

#  exec-once=hypridle

# Networkmanager & Bluetooth applets
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Exit menu

  bind = $mainMod, X, exec, ~/.config/hypr/scripts/exit-menu.sh

# -----------------------------------------------------
exec-once = dunst #Notifier
#------------------------------------------------------

env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = KWIN_TRIPLE_BUFFER,1

# -----------------------------------------------------
# Environment for xdg-desktop-portal-hyprland
# -----------------------------------------------------
  exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
